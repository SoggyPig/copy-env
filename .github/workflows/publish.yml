name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 版本更新类型
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      custom_version:
        description: '自定义版本号 (可选，例如: 1.2.3，留空则自动根据类型增加)'
        required: false
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm run lint

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Set version for publish
        id: set_version
        env:
          CUSTOM_VERSION: ${{ github.event.inputs.custom_version }}
          VERSION_TYPE: ${{ github.event.inputs.version_type }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ -n "$CUSTOM_VERSION" ]; then
              # 使用自定义版本号
              CURRENT_VERSION=$(node -p "require('./package.json').version")
              if [ "$CUSTOM_VERSION" != "$CURRENT_VERSION" ]; then
                npm version "$CUSTOM_VERSION" --no-git-tag-version
              fi
            else
              # 根据选择的类型自动增加版本
              npm version "$VERSION_TYPE" --no-git-tag-version
            fi
          fi

          # 获取当前版本用于后续步骤
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Commit version change (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          NEW_VERSION=${{ steps.set_version.outputs.version }}

          if git diff --quiet -- package.json; then
            echo "package.json already at ${NEW_VERSION}; no version commit needed."
          else
            git add package.json
            git commit -m "chore: bump version to ${NEW_VERSION} [skip ci]"
            git push origin main
          fi

      - name: Check npm version
        id: npm_version
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VERSION=${{ steps.set_version.outputs.version }}

          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> $GITHUB_OUTPUT
            echo "${PACKAGE_NAME}@${VERSION} is already published."
          else
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.npm_version.outputs.published != 'true' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')))
        run: npm publish --registry https://registry.npmjs.org --access public

      - name: Tag release (workflow_dispatch only)
        if: steps.npm_version.outputs.published != 'true' && github.event_name == 'workflow_dispatch'
        run: |
          RELEASE_TAG=${{ steps.set_version.outputs.tag }}
          CURRENT_SHA=$(git rev-parse HEAD)
          REMOTE_TAG_SHA=$(git ls-remote --tags origin "refs/tags/${RELEASE_TAG}" | awk '{print $1}')

          if [ -n "$REMOTE_TAG_SHA" ]; then
            if [ "$REMOTE_TAG_SHA" = "$CURRENT_SHA" ]; then
              echo "Tag ${RELEASE_TAG} already points to ${CURRENT_SHA}; reusing it."
            else
              echo "Tag ${RELEASE_TAG} exists at ${REMOTE_TAG_SHA}; moving it to published commit ${CURRENT_SHA}."
              git tag -f "${RELEASE_TAG}"
              git push --force origin "${RELEASE_TAG}"
            fi
          else
            git tag "${RELEASE_TAG}"
            git push origin "${RELEASE_TAG}"
          fi

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && steps.set_version.outputs.tag || github.ref_name }}
          name: Release ${{ github.event_name == 'workflow_dispatch' && steps.set_version.outputs.tag || github.ref_name }}
          body: |
            ## Changes in this release

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ## Installation

            ```bash
            npm install @hydrated_pig/copy-env@${{ steps.set_version.outputs.version }}
            ```
          draft: false
          prerelease: false

      - name: Auto bump patch version after release
        if: steps.npm_version.outputs.published != 'true' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')))
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ github.event_name }}" == "push" ]; then
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
          fi

          # 自动增加 patch 版本号
          npm version patch --no-git-tag-version

          NEW_VERSION=$(node -p "require('./package.json').version")

          git add package.json
          git commit -m "chore: bump version to ${NEW_VERSION} [skip ci]"
          git push origin main
